name: Deploy WaroengKoe Frontend ke Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Verify Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build gagal: direktori 'dist' tidak ditemukan"
            exit 1
          fi
          echo "✅ Build berhasil. Ukuran: $(du -sh dist | cut -f1)"

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} > ~/.ssh/known_hosts

      - name: Deploy via RSYNC
        run: |
          rsync -avz --delete --checksum \
            --exclude '.htaccess' \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/htdocs/${{ secrets.SITE_DOMAIN }}/

      - name: Verifikasi Deploy
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -la /home/${{ secrets.SERVER_USER }}/htdocs/${{ secrets.SITE_DOMAIN }}/index.html && echo '✅ Deploy berhasil: index.html terverifikasi'"